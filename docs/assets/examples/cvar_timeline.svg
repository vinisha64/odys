<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" style="max-width:720px; display:block; margin:0 auto; font-family:Roboto, 'Helvetica Neue', sans-serif;">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498DB"/>
    </marker>
  </defs>

  <!-- NOW marker -->
  <line x1="60" y1="50" x2="60" y2="250" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="36" y="14" width="48" height="24" rx="5" fill="#E74C3C"/>
  <text x="60" y="31" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">NOW</text>

  <!-- Stage headers -->
  <text x="245" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980B9">sdac: I know the price → commit volume (stage_fixed)</text>
  <text x="500" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#E67E22">sidc: I don't know yet → wait (stage_fixed=False)</text>

  <!-- sdac path: certain, solid -->
  <line x1="60" y1="100" x2="170" y2="100" stroke="#3498DB" stroke-width="3" stroke-linecap="round"/>
  <rect x="170" y="75" width="140" height="50" rx="8" fill="none" stroke="#3498DB" stroke-width="2"/>
  <text x="240" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498DB">sdac: 200 $/MWh</text>
  <text x="240" y="115" text-anchor="middle" font-size="11" fill="#3498DB">certain · known now</text>
  <line x1="310" y1="100" x2="420" y2="100" stroke="#3498DB" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <text x="365" y="91" text-anchor="middle" font-size="12" fill="#2980B9">profit: 18,000</text>

  <!-- sidc path: uncertain, branching -->
  <!-- From NOW down to uncertainty -->
  <path d="M 60 140 Q 80 170 120 190" fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Uncertainty box -->
  <rect x="120" y="172" width="70" height="36" rx="8" fill="none" stroke="#E67E22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="155" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#E67E22">unknown</text>

  <!-- Three branches from uncertainty -->
  <path d="M 190 190 Q 260 90 380 70" fill="none" stroke="#2ECC71" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="378,64 382,76 392,70" fill="#2ECC71"/>
  <text x="395" y="68" font-size="14" font-weight="bold" fill="#2ECC71">High: 500 $/MWh</text>
  <text x="395" y="84" font-size="11" fill="#2ECC71">profit 48,000 · p = 1/3</text>

  <path d="M 190 190 Q 280 190 380 190" fill="none" stroke="#F1C40F" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="378,184 382,196 392,190" fill="#F1C40F"/>
  <text x="395" y="188" font-size="14" font-weight="bold" fill="#7D6608">Mid: 200 $/MWh</text>
  <text x="395" y="204" font-size="11" fill="#7D6608">profit 18,000 · p = 1/3</text>

  <path d="M 190 190 Q 260 290 380 260" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="373,256 378,268 392,260" fill="#E74C3C"/>
  <text x="395" y="258" font-size="14" font-weight="bold" fill="#E74C3C">Low: 15 $/MWh</text>
  <text x="395" y="274" font-size="11" fill="#E74C3C">profit 0 · p = 1/3</text>

  <!-- Time arrow -->
  <line x1="60" y1="140" x2="650" y2="140" stroke="#DDD" stroke-width="1" stroke-dasharray="2,4"/>
  <polygon points="650,134 650,146 662,140" fill="#DDD"/>
  <text x="670" y="144" font-size="11" fill="#BBB">time</text>

  <!-- CCGT input -->
  <line x1="60" y1="115" x2="60" y2="135" stroke="#E67E22" stroke-width="2"/>
  <polygon points="54,133 60,143 66,133" fill="#E67E22"/>
  <text x="28" y="124" text-anchor="end" font-size="11" font-weight="bold" fill="#E67E22">CCGT</text>
  <text x="28" y="137" text-anchor="end" font-size="11" fill="#E67E22">100 MW</text>
</svg>
